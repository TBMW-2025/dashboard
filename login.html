<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Placement Monitor Dashboard Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }

        body {
            height: 100vh;
            background: #162337;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MAIN CONTAINER */

        .container {
            display: flex;
            width: 900px;
            height: 500px;
            background: #111f33;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        /* LEFT SIDE */

        .left {
            flex: 1;
            background: linear-gradient(160deg, #0b1a2a, #07121e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 40px;
        }

        .logo {
            width: 140px;
            margin-bottom: 8px;
        }

        .left h1 {
            font-size: 28px;
            color: #ff8c00;
            margin: 0;
            white-space: nowrap;
        }

        .left p {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.7;
        }

        /* RIGHT SIDE */

        .right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            background: #0f2236;
        }

        .right h2 {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        /* INPUT BOX */

        .input-box {
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #1b344d;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        /* INPUT HOVER EFFECT */

        .input-box input:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        .input-box input:focus {
            transform: translateY(-4px);
            box-shadow: 0 0 8px rgba(255, 140, 0, 0.6);
        }

        /* LOGIN BUTTON */

        button {
            width: 100%;
            padding: 12px;
            background: #ff8c00;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 12px rgba(255, 140, 0, 0.7);
            background: #ffa733;
        }

        button:active {
            transform: translateY(1px);
        }

        /* EXTRA LINKS */

        .extra {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .extra a {
            color: #ff8c00;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="left">

            <img src="https://rise.rru.ac.in/img/home-9/hero/RRU-Logo.png" class="logo">

            <h1>Placement Monitor Dashboard</h1>

            <p>Future Leaders and Security Intelligence</p>

        </div>


        <div class="right">

            <h2>Login</h2>

            <form id="loginForm">

                <div class="input-box">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="input-box">
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <button type="submit">Login</button>

                <div class="extra">
                    <a href="#">Forgot Password ?</a>
                    <a href="#">Create Account !</a>
                </div>

            </form>

        </div>

    </div>


    <script>

        document.getElementById("loginForm").addEventListener("submit", function (event) {

            event.preventDefault();

            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value.trim();

            let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            if (email === "") {
                alert("Email cannot be empty");
                return;
            }

            if (!email.match(emailPattern)) {
                alert("Enter a valid email address");
                return;
            }

            if (password === "") {
                alert("Password cannot be empty");
                return;
            }

            if (password.length < 6) {
                alert("Password must be at least 6 characters");
                return;
            }

            alert("Login Successful");

            window.location.href = "dashboard.html";

        });

    </script>

</body>

</html>
